name: Build Service

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      watch-paths:
        required: true
        type: string
      force-build:
        required: false
        type: string
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Detect relevant file changes
        if: inputs.force-build != 'true'
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: HEAD~1
          filters: ${{ inputs.watch-paths }}

      - uses: docker/setup-buildx-action@v2
        if: inputs.force-build == 'true' || steps.changes.outputs.service == 'true'

      - name: Log in to Docker Hub
        if: (inputs.force-build == 'true' || steps.changes.outputs.service == 'true') && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ inputs.service-name }}
        if: inputs.force-build == 'true' || steps.changes.outputs.service == 'true'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          tags: |
            quantpiece/${{ inputs.service-name }}:${{ github.event.workflow_run.head_sha || github.sha }}
            quantpiece/${{ inputs.service-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
