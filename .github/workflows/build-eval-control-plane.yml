name: Build eval-control-plane

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.ref || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check lint succeeded
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          CONCLUSION=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/check-runs" \
            --jq '[.check_runs[] | select(.name == "lint")] | first | .conclusion // "not_found"')
          echo "Lint conclusion: $CONCLUSION"
          if [ "$CONCLUSION" != "success" ]; then
            echo "Lint did not succeed (conclusion: $CONCLUSION). Skipping build."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check if service files changed
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          CHANGED=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}" \
            --jq '[.files[].filename] | join("\n")' 2>/dev/null || echo '')
          if echo "$CHANGED" | grep -qE '^(environment\.yml|pyproject\.toml|libs/|services/eval_control_plane/|infra/docker/eval-control-plane\.Dockerfile)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up QEMU
        if: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.changed == 'true' }}
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        if: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.changed == 'true' }}
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        if: ${{ (github.event_name == 'workflow_dispatch' || steps.filter.outputs.changed == 'true') && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push eval-control-plane
        if: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.changed == 'true' }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: infra/docker/eval-control-plane.Dockerfile
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          tags: |
            quantpiece/eval-control-plane:${{ github.event.workflow_run.head_sha || github.sha }}
            quantpiece/eval-control-plane:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
