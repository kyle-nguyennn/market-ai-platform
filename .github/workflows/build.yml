name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      built: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build (use GitHub Actions cache)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: helloworld141/market-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            helloworld141/market-ai:${{ github.sha }}
            helloworld141/market-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

# Note: The 'publish' job will only run when DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are set
# in the repository secrets. No secrets are added by this PR; placeholders are referenced above.
