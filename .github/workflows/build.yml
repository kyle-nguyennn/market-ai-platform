name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        service:
          - name: dataset-platform
            dockerfile: infra/docker/dataset-platform.Dockerfile
          - name: eval-control-plane
            dockerfile: infra/docker/eval-control-plane.Dockerfile
          - name: inference-gateway
            dockerfile: infra/docker/inference-gateway.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        # QEMU enables emulation of non-native CPU architectures (e.g., ARM) on x86 runners,
        # which is required when building multi-platform images with Buildx.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        # Buildx is the extended Docker build client that enables multi-platform builds,
        # and allows exporting/importing layer caches to/from GitHub Actions cache (type=gha).

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: quantpiece/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    strategy:
      matrix:
        service:
          - name: dataset-platform
            dockerfile: infra/docker/dataset-platform.Dockerfile
          - name: eval-control-plane
            dockerfile: infra/docker/eval-control-plane.Dockerfile
          - name: inference-gateway
            dockerfile: infra/docker/inference-gateway.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }} to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            quantpiece/${{ matrix.service.name }}:${{ github.sha }}
            quantpiece/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

# Note: The 'publish' job will only run when DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are set
# in the repository secrets. No secrets are added by this PR; placeholders are referenced above.
