name: market-ai
channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.11

  # --- GPU PyTorch ---
  # Change pytorch-cuda to match your NVIDIA driver.
  #   Driver >= 525 → cuda 12.1
  #   Driver >= 450 → cuda 11.8
  - pytorch>=2.2
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # --- Web / API ---
  - fastapi>=0.111
  - uvicorn>=0.30
  - pydantic>=2.0
  - pydantic-settings>=2.0
  - httpx>=0.27

  # --- Data ---
  - polars>=0.20
  - pandas>=2.0
  - pyarrow>=15.0
  - duckdb>=0.10

  # --- Storage ---
  - sqlalchemy>=2.0
  - alembic>=1.13
  - psycopg2>=2.9
  - redis-py>=5.0

  # --- ML ---
  - xgboost>=2.0
  - lightgbm
  - scikit-learn
  - onnxruntime
  - numpy
  - scipy

  # --- Observability ---
  - prometheus_client>=0.20
  - structlog>=24.0

  # --- Research / notebooks ---
  - jupyter
  - jupyterlab>=4.0
  - ipykernel
  - matplotlib
  - seaborn
  - plotly

  # --- Dev / test ---
  - pytest>=8.0
  - pytest-asyncio>=0.23
  - ruff>=0.4
  - mypy>=1.10

  # --- Editable install of this repo (libs/*) ---
  - pip
  - pip:
    - -e .
